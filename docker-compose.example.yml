# Example compose for running Meeting Service standalone.
# Copy to `docker-compose.yml` and adjust. No secrets live here — values come from
# your `.env` (see .env.example). Parakeet (STT), pyannote (diarization), and
# Ollama are expected to be provided separately; point the URLs at your own
# instances.

services:
  meeting-service:
    build: .
    container_name: meeting-service
    ports:
      - "8191:8000"
    volumes:
      - ./data/meetings:/data/meetings
      - ./data/notes:/data/notes
    environment:
      - PARAKEET_URL=${PARAKEET_URL:-http://parakeet-asr:5092}
      - DIARIZER_URL=${DIARIZER_URL:-http://pyannote-diarizer:8000}
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen3:14b}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-qwen3-embedding:0.6b}
      - QDRANT_URL=${QDRANT_URL:-http://qdrant:6333}
      - OPENWEBUI_URL=${OPENWEBUI_URL:-}
      - OPENWEBUI_API_KEY=${OPENWEBUI_API_KEY:-}
      - NOTES_DIR=/data/notes
      - MEETINGS_DIR=/data/meetings
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - qdrant
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: meeting-qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./data/qdrant:/qdrant/storage
    restart: unless-stopped

  # Parakeet (STT, OpenAI-compatible /v1/audio/transcriptions endpoint) and
  # pyannote (speaker diarization, /diarize endpoint) are NOT included here —
  # run them yourself and set PARAKEET_URL / DIARIZER_URL accordingly. Ollama
  # typically runs natively on the host (reached via host.docker.internal).
